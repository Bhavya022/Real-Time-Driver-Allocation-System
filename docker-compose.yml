version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: vybe
      POSTGRES_PASSWORD: vybe
      POSTGRES_DB: vybe
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - '6379:6379'

volumes:
  pgdata:
